# OpenDecree Helm chart values.

replicaCount: 1

image:
  repository: ghcr.io/opendecree/decree
  tag: ""  # defaults to Chart.appVersion
  # Always pull so security-patch updates on a moving tag propagate without manual rollout.
  # Override to IfNotPresent only when pinning by digest (recommended for production).
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# --- Service configuration ---

config:
  # Storage backend: "postgres" (default) or "memory" (no external deps, data not persisted).
  storageBackend: postgres

  # gRPC port inside the container.
  grpcPort: 9090

  # HTTP/REST gateway port. Set to enable the REST API + Swagger UI.
  # Leave empty to disable the gateway.
  httpPort: "8080"

  # Services to enable (comma-separated): schema, config, audit.
  enableServices: "schema,config,audit"

  # Log level: debug, info, warn, error.
  logLevel: info

# --- Database (required when storageBackend=postgres) ---

database:
  # PostgreSQL connection string for writes.
  writeUrl: ""
  # PostgreSQL connection string for reads (defaults to writeUrl).
  readUrl: ""
  # Use an existing secret for database URLs instead of plain values.
  existingSecret: ""
  # Key in the existing secret for DB_WRITE_URL.
  writeUrlKey: "DB_WRITE_URL"
  # Key in the existing secret for DB_READ_URL.
  readUrlKey: "DB_READ_URL"

# --- Redis (required when storageBackend=postgres) ---

redis:
  # Redis connection URL.
  url: ""
  # Use an existing secret for the Redis URL.
  existingSecret: ""
  # Key in the existing secret for REDIS_URL.
  urlKey: "REDIS_URL"
  # IMPORTANT: Configure your Redis instance with memory limits to prevent OOM.
  # Recommended settings (set on your Redis server, not here):
  #   maxmemory 256mb
  #   maxmemory-policy allkeys-lru

# --- Authentication ---

auth:
  # JWT JWKS URL. Leave empty for metadata-based auth (default).
  jwksUrl: ""
  # Expected JWT issuer (optional, only used with JWT).
  jwtIssuer: ""

# --- Rate limiting ---

rateLimit:
  # Master switch. Set to false to disable all rate limiting.
  enabled: true
  # Requests per second for unauthenticated (anonymous) callers — shared global bucket per method.
  anonRPS: "10"
  # Requests per second per tenant for authenticated callers.
  authedRPS: "100"
  # Requests per second per superadmin identity. "0" = unlimited.
  superadminRPS: "0"
  # Token bucket burst size (applies to all role classes).
  burst: "10"

# --- Observability (all opt-in) ---

otel:
  enabled: false
  tracesGrpc: false
  tracesDb: false
  tracesRedis: false
  metricsGrpc: false
  metricsDbPool: false
  metricsCache: false
  metricsConfig: false
  metricsSchema: false
  metricsRateLimit: false

# --- Kubernetes resources ---

service:
  type: ClusterIP
  grpcPort: 9090
  httpPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: decree.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Default resource requests/limits keep a single pod from starving its node.
# Override (or set to {}) for benchmarking, dev, or larger production sizing.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

# NetworkPolicy restricts egress to the documented dependencies (PG, Redis, JWKS,
# DNS, OTel collector) and ingress to the configured client paths. Disabled by
# default during alpha; recommended for any multi-tenant or production cluster.
networkPolicy:
  enabled: false
  # Pod selectors / namespace selectors permitted to reach the gRPC + HTTP ports.
  # Empty = allow from any pod in the same namespace.
  ingressFrom: []
    # - podSelector:
    #     matchLabels:
    #       app: my-client
    # - namespaceSelector:
    #     matchLabels:
    #       name: trusted-ns
  egress:
    # CIDR (or in-cluster selector) for PostgreSQL. Empty = no rule emitted.
    postgresCIDR: ""
    postgresPort: 5432
    # CIDR (or in-cluster selector) for Redis.
    redisCIDR: ""
    redisPort: 6379
    # JWKS endpoint host CIDR (when JWT auth is enabled).
    jwksCIDR: ""
    jwksPort: 443
    # OpenTelemetry collector CIDR (when otel.enabled).
    otelCIDR: ""
    otelPort: 4317
    # Allow DNS resolution (kube-dns / CoreDNS). Disable only in clusters with
    # custom service discovery.
    allowDNS: true

nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
