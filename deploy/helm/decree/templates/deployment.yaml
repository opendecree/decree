apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "decree.fullname" . }}
  labels:
    {{- include "decree.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "decree.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "decree.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "decree.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: decree
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "decree.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.config.grpcPort }}
              protocol: TCP
            {{- if .Values.config.httpPort }}
            - name: http
              containerPort: {{ .Values.config.httpPort }}
              protocol: TCP
            {{- end }}
          env:
            - name: GRPC_PORT
              value: {{ .Values.config.grpcPort | quote }}
            {{- if .Values.config.httpPort }}
            - name: HTTP_PORT
              value: {{ .Values.config.httpPort | quote }}
            {{- end }}
            - name: STORAGE_BACKEND
              value: {{ .Values.config.storageBackend | quote }}
            - name: ENABLE_SERVICES
              value: {{ .Values.config.enableServices | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            {{- if eq .Values.config.storageBackend "postgres" }}
            {{- if .Values.database.existingSecret }}
            - name: DB_WRITE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.writeUrlKey }}
            - name: DB_READ_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.readUrlKey }}
            {{- else }}
            - name: DB_WRITE_URL
              value: {{ .Values.database.writeUrl | quote }}
            - name: DB_READ_URL
              value: {{ .Values.database.readUrl | default .Values.database.writeUrl | quote }}
            {{- end }}
            {{- if .Values.redis.existingSecret }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret }}
                  key: {{ .Values.redis.urlKey }}
            {{- else }}
            - name: REDIS_URL
              value: {{ .Values.redis.url | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.auth.jwksUrl }}
            - name: JWT_JWKS_URL
              value: {{ .Values.auth.jwksUrl | quote }}
            {{- end }}
            {{- if .Values.auth.jwtIssuer }}
            - name: JWT_ISSUER
              value: {{ .Values.auth.jwtIssuer | quote }}
            {{- end }}
            {{- if .Values.rateLimit.enabled }}
            - name: RATE_LIMIT_ENABLED
              value: "true"
            - name: RATE_LIMIT_ANON_RPS
              value: {{ .Values.rateLimit.anonRPS | quote }}
            - name: RATE_LIMIT_AUTHED_RPS
              value: {{ .Values.rateLimit.authedRPS | quote }}
            - name: RATE_LIMIT_SUPERADMIN_RPS
              value: {{ .Values.rateLimit.superadminRPS | quote }}
            - name: RATE_LIMIT_BURST
              value: {{ .Values.rateLimit.burst | quote }}
            {{- else }}
            - name: RATE_LIMIT_ENABLED
              value: "false"
            {{- end }}
            {{- if .Values.otel.enabled }}
            - name: OTEL_ENABLED
              value: "true"
            {{- if .Values.otel.tracesGrpc }}
            - name: OTEL_TRACES_GRPC
              value: "true"
            {{- end }}
            {{- if .Values.otel.tracesDb }}
            - name: OTEL_TRACES_DB
              value: "true"
            {{- end }}
            {{- if .Values.otel.tracesRedis }}
            - name: OTEL_TRACES_REDIS
              value: "true"
            {{- end }}
            {{- if .Values.otel.metricsGrpc }}
            - name: OTEL_METRICS_GRPC
              value: "true"
            {{- end }}
            {{- if .Values.otel.metricsDbPool }}
            - name: OTEL_METRICS_DB_POOL
              value: "true"
            {{- end }}
            {{- if .Values.otel.metricsCache }}
            - name: OTEL_METRICS_CACHE
              value: "true"
            {{- end }}
            {{- if .Values.otel.metricsConfig }}
            - name: OTEL_METRICS_CONFIG
              value: "true"
            {{- end }}
            {{- if .Values.otel.metricsSchema }}
            - name: OTEL_METRICS_SCHEMA
              value: "true"
            {{- end }}
            {{- if .Values.otel.metricsRateLimit }}
            - name: OTEL_METRICS_RATE_LIMIT
              value: "true"
            {{- end }}
            {{- end }}
            {{- if .Values.tls.insecure }}
            - name: INSECURE_LISTEN
              value: "1"
            {{- end }}
            {{- if .Values.tls.certSecret }}
            - name: TLS_CERT_FILE
              value: /etc/decree/tls/server/tls.crt
            - name: TLS_KEY_FILE
              value: /etc/decree/tls/server/tls.key
            {{- end }}
            {{- if .Values.tls.clientCASecret }}
            - name: TLS_CLIENT_CA_FILE
              value: /etc/decree/tls/client-ca/ca.crt
            {{- end }}
            {{- if .Values.tls.gateway.caSecret }}
            - name: TLS_GATEWAY_CA_FILE
              value: /etc/decree/tls/gateway-ca/ca.crt
            {{- end }}
            {{- if .Values.tls.gateway.serverName }}
            - name: TLS_GATEWAY_SERVER_NAME
              value: {{ .Values.tls.gateway.serverName | quote }}
            {{- end }}
            {{- if .Values.tls.gateway.clientCertSecret }}
            - name: TLS_GATEWAY_CLIENT_CERT_FILE
              value: /etc/decree/tls/gateway-client/tls.crt
            - name: TLS_GATEWAY_CLIENT_KEY_FILE
              value: /etc/decree/tls/gateway-client/tls.key
            {{- end }}
          {{- if or .Values.tls.certSecret .Values.tls.clientCASecret .Values.tls.gateway.caSecret .Values.tls.gateway.clientCertSecret }}
          volumeMounts:
            {{- if .Values.tls.certSecret }}
            - name: tls-server
              mountPath: /etc/decree/tls/server
              readOnly: true
            {{- end }}
            {{- if .Values.tls.clientCASecret }}
            - name: tls-client-ca
              mountPath: /etc/decree/tls/client-ca
              readOnly: true
            {{- end }}
            {{- if .Values.tls.gateway.caSecret }}
            - name: tls-gateway-ca
              mountPath: /etc/decree/tls/gateway-ca
              readOnly: true
            {{- end }}
            {{- if .Values.tls.gateway.clientCertSecret }}
            - name: tls-gateway-client
              mountPath: /etc/decree/tls/gateway-client
              readOnly: true
            {{- end }}
          {{- end }}
          readinessProbe:
            grpc:
              port: {{ .Values.config.grpcPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: {{ .Values.config.grpcPort }}
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if or .Values.tls.certSecret .Values.tls.clientCASecret .Values.tls.gateway.caSecret .Values.tls.gateway.clientCertSecret }}
      volumes:
        {{- if .Values.tls.certSecret }}
        - name: tls-server
          secret:
            secretName: {{ .Values.tls.certSecret }}
        {{- end }}
        {{- if .Values.tls.clientCASecret }}
        - name: tls-client-ca
          secret:
            secretName: {{ .Values.tls.clientCASecret }}
        {{- end }}
        {{- if .Values.tls.gateway.caSecret }}
        - name: tls-gateway-ca
          secret:
            secretName: {{ .Values.tls.gateway.caSecret }}
        {{- end }}
        {{- if .Values.tls.gateway.clientCertSecret }}
        - name: tls-gateway-client
          secret:
            secretName: {{ .Values.tls.gateway.clientCertSecret }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
