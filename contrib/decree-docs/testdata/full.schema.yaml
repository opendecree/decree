# Fixture exercising every documented schema and field property across all
# eight field types. generate_test.go pins its JSON form in full.golden.json.
spec_version: v1
name: payments
description: Payment processing configuration.
version: 3
version_description: Added refund window and webhook controls.
info:
  title: Payments Configuration
  author: platform-team
  contact:
    name: Pat
    email: pat@example.com
    url: https://example.com/payments-team
  labels:
    team: platform
    tier: critical
fields:
  payments.enabled:
    type: bool
    title: Payments Enabled
    description: Master switch for payment processing.
    default: "true"
  payments.fee:
    type: number
    description: Per-transaction fee rate.
    default: "0.01"
    nullable: true
    example: "0.02"
    examples:
      low:
        value: "0.01"
        summary: Promotional rate
      high:
        value: "0.99"
    externalDocs:
      description: Fee guide
      url: https://docs.example.com/fees
    tags: [billing, rates]
    constraints:
      minimum: 0
      maximum: 1
  payments.retries:
    type: integer
    description: Delivery attempts per webhook event.
    default: "3"
    constraints:
      exclusiveMinimum: 0
      exclusiveMaximum: 10
  payments.mode:
    type: string
    description: Processing mode.
    default: test
    deprecated: true
    redirect_to: payments.environment
    constraints:
      enum: [live, test]
  payments.environment:
    type: string
    description: Deployment environment label.
    readOnly: true
    constraints:
      minLength: 2
      maxLength: 32
      pattern: "^[a-z][a-z0-9-]*$"
  payments.api_key:
    type: string
    format: password
    description: Gateway API key.
    sensitive: true
    writeOnce: true
  payments.metadata:
    type: json
    description: Free-form gateway metadata.
    constraints:
      json_schema: '{"type":"object"}'
  payments.refund_window:
    type: duration
    description: Window during which refunds are accepted.
    default: 72h
  payments.cutoff:
    type: time
    description: Daily settlement cutoff.
    nullable: true
  payments.webhook:
    type: url
    title: Webhook URL
    description: Endpoint receiving payment events.
    constraints:
      allowed_schemes: [https, sftp]
