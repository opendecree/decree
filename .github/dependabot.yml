version: 2
updates:
  - package-ecosystem: gomod
    directories:
      - /
      - /api
      - /cmd/decree
      - /e2e
      - /sdk/configclient
      - /sdk/adminclient
      - /sdk/configwatcher
      - /sdk/grpctransport
      - /sdk/tools
      - /examples/quickstart
      - /examples/setup
      - /examples/schema-lifecycle
      - /examples/feature-flags
      - /examples/config-validation
      - /examples/multi-tenant
      - /examples/live-config
      - /examples/environment-bootstrap
      - /examples/optimistic-concurrency
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # The Go ecosystem is moving its floor to Go 1.25 in lockstep. We hold the
      # SDK transport floor at 1.24, so any dep version that requires Go 1.25 is
      # ignored until we revisit the floor. Re-evaluate periodically.
      - dependency-name: "github.com/grpc-ecosystem/grpc-gateway/v2"
        versions: [">=2.29.0"]
      - dependency-name: "go.opentelemetry.io/otel"
        versions: [">=1.43.0"]
      - dependency-name: "go.opentelemetry.io/otel/sdk/metric"
        versions: [">=1.43.0"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /build
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
