name: Bug Report
description: Report a bug in the OpenDecree server, CLI, or Go SDKs
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: To reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Server
        - CLI
        - Go SDK (configclient)
        - Go SDK (adminclient)
        - Go SDK (configwatcher)
        - Go SDK (tools)
        - Proto / API
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OpenDecree version
      placeholder: e.g., v0.5.0
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: e.g., 1.24
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g., Linux, macOS, Windows
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that helps.
