changelog:
  exclude:
    labels:
      - duplicate
      - invalid
      - wontfix
  categories:
    - title: "⚠️ Breaking Changes"
      labels:
        - breaking
    - title: "Proto / API"
      labels:
        - proto
    - title: "Server"
      labels:
        - server
    - title: "SDK"
      labels:
        - sdk
    - title: "CLI"
      labels:
        - cli
    - title: "Infrastructure"
      labels:
        - ci
        - docker
        - helm
    - title: "Documentation"
      labels:
        - docs
        - documentation
    - title: "Dependencies"
      labels:
        - dependencies
    - title: "Other Changes"
      labels:
        - "*"
