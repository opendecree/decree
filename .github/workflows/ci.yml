# CI pipeline for OpenDecree server, SDKs, and CLI.
#
# Jobs: changes ──┬── tools → lint, docs, e2e, examples ──→ check (alls-green gate)
#                 └── test, sdk-compat, govulncheck, deps-review ─┘
#
# The changes job runs dorny/paths-filter; all downstream jobs (tools, lint,
# test, sdk-compat, docs, e2e, examples, govulncheck) skip on docs-only PRs —
# zero-cost CI for top-level Markdown edits.
#
# The tools job builds/caches the Docker image used by lint, docs, e2e, examples,
# with a registry-backed buildx cache (:buildcache tag) so unchanged layers are
# pulled from ghcr and only modified layers rebuild.
#
# Security posture (issue #8):
#   - Workflow-level permissions default to `contents: read` — jobs opt into more.
#   - Only `tools` has `packages: write` (pushes the tools image); consumers get
#     `packages: read` to pull.
#   - All actions/checkout steps use `persist-credentials: false` so the
#     GITHUB_TOKEN isn't left in .git/config for later steps.
#   - `deps-review` blocks PRs that add dependencies with known high-severity
#     vulnerabilities.
#   - `govulncheck` scans Go code for known vulnerabilities in imported packages.
#
# The check job aggregates all results for branch protection (skipped jobs allowed).
#
# Cache budget: all Docker layer caches live on ghcr.io as `:buildcache` tags on
# their respective image repos (no 10GB GHA cache limit). Writers:
#   - main.yml  → ghcr.io/<owner>/decree:buildcache, decree-cli:buildcache
#   - release.yml → same refs (shared with main.yml, mode=max)
#   - tools job → ghcr.io/<owner>/decree-tools:buildcache
# ci.yml e2e/examples are read-only consumers.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TOOLS_IMAGE: ghcr.io/${{ github.repository_owner }}/decree-tools

jobs:
  # Detects which paths changed so downstream jobs can skip on docs-only PRs.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run path filter
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - '**/go.mod'
              - '**/go.sum'
              - 'proto/**'
              - 'db/**'
              - 'build/**'
              - 'Makefile'
              - 'docker-compose*.yml'
              - '.github/workflows/**'

  # Builds/pushes the shared decree-tools Docker image used by downstream jobs.
  # Skips the build if an image tagged with the Dockerfile hash already exists
  # on ghcr; registry-backed buildx cache reuses unchanged layers on miss.
  tools:
    name: Tools image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      packages: write
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Compute Dockerfile hash
        id: hash
        run: echo "tag=sha-$(sha256sum build/Dockerfile.tools | head -c 12)" >> $GITHUB_OUTPUT

      - name: Check if image exists
        id: check
        run: |
          if docker manifest inspect "${{ env.TOOLS_IMAGE }}:${{ steps.hash.outputs.tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        if: steps.check.outputs.exists == 'false'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push tools image
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfile.tools
          push: true
          tags: ${{ env.TOOLS_IMAGE }}:${{ steps.hash.outputs.tag }}
          cache-from: type=registry,ref=${{ env.TOOLS_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.TOOLS_IMAGE }}:buildcache,mode=max

    outputs:
      image: ${{ env.TOOLS_IMAGE }}:${{ steps.hash.outputs.tag }}

  # Runs golangci-lint against Go code and buf lint/breaking against protos.
  # buf breaking needs main fetched so it can diff the current branch.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [tools, changes]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      packages: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Fetch main branch for buf breaking
        if: github.ref != 'refs/heads/main'
        run: git fetch origin main:main

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Go lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: Go format check
        run: golangci-lint fmt --diff

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull tools image
        run: |
          docker pull "${{ needs.tools.outputs.image }}"
          docker tag "${{ needs.tools.outputs.image }}" decree-tools
          touch .tools-image-built

      - name: Proto lint + breaking
        run: make lint-proto

  # Builds the server + CLI, runs unit, SDK, and CLI tests in parallel, then
  # enforces the coverage ratchet defined in coverage-thresholds.json.
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Build server + CLI
        run: |
          go build -o bin/decree-server ./cmd/server
          cd cmd/decree && go build -o ../../bin/decree .

      - name: Unit tests
        run: go test ./internal/... -race -count=1

      - name: SDK + CLI + tools tests
        run: |
          cd sdk/configclient && go test ./... -count=1 &
          cd sdk/adminclient && go test ./... -count=1 &
          cd sdk/configwatcher && go test ./... -count=1 &
          cd sdk/tools && go test ./... -count=1 &
          cd cmd/decree && go test ./... -count=1 &
          wait

      - name: Coverage ratchet
        run: ./scripts/check-coverage.sh

  # Proves the SDK core modules still build and test against older Go versions
  # we advertise support for (1.22 is the lowest SDK-supported minor).
  sdk-compat:
    name: SDK compat (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 10
    strategy:
      matrix:
        go: ["1.22", "1.23"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: "**/go.sum"

      - name: Build SDK core modules
        run: |
          cd sdk/configclient && go build ./...
          cd ../adminclient && go build ./...
          cd ../configwatcher && go build ./...

      - name: Test SDK core modules
        run: |
          cd sdk/configclient && go test ./... -count=1 &
          cd sdk/adminclient && go test ./... -count=1 &
          cd sdk/configwatcher && go test ./... -count=1 &
          wait

  # Regenerates docs + OpenAPI spec and fails if the generated output differs
  # from what's committed. Catches forgotten `make generate docs` runs.
  docs:
    name: Docs check
    runs-on: ubuntu-latest
    needs: [tools, changes]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      packages: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull tools image
        run: |
          docker pull "${{ needs.tools.outputs.image }}"
          docker tag "${{ needs.tools.outputs.image }}" decree-tools
          touch .tools-image-built

      - name: Regenerate docs and OpenAPI spec
        run: make generate docs

      - name: Check docs are up-to-date
        run: |
          if ! git diff --exit-code docs/ cmd/server/openapi.json; then
            echo "::error::Generated docs or OpenAPI spec are out of date. Run 'make generate docs' and commit."
            exit 1
          fi

  # Boots the service via docker compose and runs the e2e Go test suite
  # against it. Pre-builds the server image locally using the ghcr layer cache.
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [tools, changes]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      packages: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull tools image
        run: docker pull "${{ needs.tools.outputs.image }}" && docker tag "${{ needs.tools.outputs.image }}" decree-tools

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          driver-opts: network=host

      - name: Pre-build server image with layer cache
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfile
          load: true
          tags: decree-service
          # Read-only: main.yml is the canonical writer for this cache.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/decree:buildcache

      - name: Run E2E tests
        run: |
          docker compose up -d --wait service
          cd e2e && go test -tags=e2e -v -race -count=1 ./... || (cd .. && docker compose down -v && exit 1)
          docker compose down -v
        env:
          TOOLS_IMAGE: ${{ needs.tools.outputs.image }}

  # Runs the hands-on example programs against the freshly-built server image,
  # catching SDK regressions that only surface in real integration scenarios.
  examples:
    name: Examples
    runs-on: ubuntu-latest
    needs: [tools, changes]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      packages: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull tools image
        run: docker pull "${{ needs.tools.outputs.image }}" && docker tag "${{ needs.tools.outputs.image }}" decree-tools

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          driver-opts: network=host

      - name: Pre-build server image with layer cache
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfile
          load: true
          tags: decree-service
          # Read-only: main.yml is the canonical writer for this cache.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/decree:buildcache

      - name: Run examples
        run: make examples
        env:
          TOOLS_IMAGE: ${{ needs.tools.outputs.image }}

  # Blocks PRs that introduce dependencies with known high-severity
  # vulnerabilities (GitHub Advisory Database). Fails closed on severity >= high.
  deps-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Review dependencies
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # Scans imported Go packages (and reachable call sites) for known CVEs
  # using the Go vulnerability database. Complements deps-review by also
  # catching vulnerabilities in transitive deps already on main.
  govulncheck:
    name: Go vuln scan
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          work-dir: .

  # Validates every checked-in *.decree.schema.yaml and *.decree.config.yaml
  # against the v0.1.0 meta-schemas, and asserts every fixture under
  # schemas/v0.1.0/testdata/invalid/ FAILS validation. Closes #124.
  #
  # Runs unconditionally — no needs.changes gate — because the script also
  # cross-checks the meta-schema sources themselves and is fast enough that
  # path-filtering would add more complexity than it saves.
  meta-schemas:
    name: Meta-schemas check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install jsonschema
        run: pip install --no-cache-dir 'jsonschema>=4.21' 'PyYAML>=6'

      - name: Validate meta-schemas
        run: make validate-meta-schemas

  # Aggregates all job results for branch protection. A single required check
  # that passes iff every listed job passed or was legitimately skipped.
  check:
    name: CI check
    if: always()
    needs: [lint, test, sdk-compat, docs, e2e, examples, govulncheck, deps-review, meta-schemas]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: All green gate
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: lint, test, sdk-compat, docs, e2e, examples, govulncheck, deps-review
