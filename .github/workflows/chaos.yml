# Chaos / fault-injection test suite.
#
# Runs on a weekly schedule and on manual dispatch. Not on every PR because
# these tests kill containers and take ~5 minutes.
#
# Trigger manually: gh workflow run chaos.yml --repo opendecree/decree

name: Chaos

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1" # Mondays at 04:00 UTC

concurrency:
  group: chaos
  cancel-in-progress: false # never interrupt a running chaos run

permissions:
  contents: read

env:
  TOOLS_IMAGE: ghcr.io/${{ github.repository_owner }}/decree-tools

jobs:
  chaos:
    name: Chaos tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          driver-opts: network=host

      - name: Pre-build server image with layer cache
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfile
          load: true
          tags: decree-service
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/decree:buildcache
            type=gha,scope=server-build
          cache-to: type=gha,scope=server-build,mode=max

      - name: Run chaos tests
        run: make chaos
