# Runs on `v*` tag pushes — generates release notes, publishes binaries via
# goreleaser, pushes protos to the BSR, and pushes multi-arch release images.
#
# NOTE: Do not call ci.yml as a reusable workflow from this file. Reusable
# workflow resolution (`uses: ./.github/workflows/ci.yml`) fails from a
# tag-push context with `startup_failure`, because the ref points at a tag
# rather than a branch the workflow file can be resolved against. If CI
# needs to run on release, either duplicate the jobs here or trigger ci.yml
# via a separate workflow_run. Fixed in commit f996187 (removed reusable
# call). See opendecree/decree#88.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io

jobs:
  # Detects breaking proto/SDK changes since the previous tag, assembles the
  # release body with install instructions, and creates the GitHub release.
  release-notes:
    name: Release notes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Find previous tag
        id: prev
        run: |
          PREV=$(git tag -l "v*" --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          echo "tag=${PREV:-}" >> $GITHUB_OUTPUT
          echo "Previous tag: ${PREV:-none}"

      - name: Detect proto breaking changes
        id: proto
        if: steps.prev.outputs.tag != ''
        run: |
          make tools 2>/dev/null || true
          BREAKING=$(docker run --rm \
            -v "$PWD:/workspace" -w /workspace \
            decree-tools \
            buf breaking --against ".git#tag=${{ steps.prev.outputs.tag }}" 2>&1) || true
          if [ -n "$BREAKING" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
            echo "details<<${EOF_MARKER}" >> $GITHUB_OUTPUT
            echo "$BREAKING" >> $GITHUB_OUTPUT
            echo "${EOF_MARKER}" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect SDK API changes
        id: sdk
        if: steps.prev.outputs.tag != ''
        continue-on-error: true
        env:
          GOTOOLCHAIN: auto
        run: |
          go install golang.org/x/exp/cmd/apidiff@latest
          NOTES=""
          for mod in sdk/configclient sdk/adminclient sdk/configwatcher sdk/grpctransport sdk/tools; do
            MOD_TAG="${mod}/$(echo $GITHUB_REF_NAME)"
            PREV_TAG="${mod}/${{ steps.prev.outputs.tag }}"
            # Check if both tags exist
            if git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
              DIFF=$(cd "$mod" && apidiff "$PREV_TAG" "$MOD_TAG" 2>/dev/null) || true
              if [ -n "$DIFF" ]; then
                NOTES="${NOTES}\n### ${mod}\n\`\`\`\n${DIFF}\n\`\`\`\n"
              fi
            fi
          done
          if [ -n "$NOTES" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
            echo "details<<${EOF_MARKER}" >> $GITHUB_OUTPUT
            echo -e "$NOTES" >> $GITHUB_OUTPUT
            echo "${EOF_MARKER}" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Build release body
        id: body
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          {
            if [ "${{ steps.proto.outputs.found }}" = "true" ]; then
              echo "## Proto Breaking Changes"
              echo ""
              echo '```'
              echo "${{ steps.proto.outputs.details }}"
              echo '```'
              echo ""
            fi

            if [ "${{ steps.sdk.outputs.found }}" = "true" ]; then
              echo "## SDK API Changes"
              echo ""
              echo "${{ steps.sdk.outputs.details }}"
              echo ""
            fi

            cat <<INSTALL
          ## Install

          \`\`\`bash
          # Homebrew (macOS / Linux)
          brew install opendecree/tap/decree

          # CLI via go install
          go install github.com/opendecree/decree/cmd/decree@${TAG}

          # Debian / Ubuntu
          # Download decree_linux_amd64.deb from Assets below
          dpkg -i decree_linux_amd64.deb

          # RPM (RHEL / Fedora)
          # Download decree_linux_amd64.rpm from Assets below
          rpm -i decree_linux_amd64.rpm

          # SDK (grpctransport pulls in configclient + configwatcher)
          go get github.com/opendecree/decree/sdk/grpctransport@${TAG}
          go get github.com/opendecree/decree/sdk/adminclient@${TAG}

          # Docker (multi-arch: amd64 + arm64)
          docker pull ghcr.io/opendecree/decree:${VERSION}
          \`\`\`

          ## Verify provenance

          All binaries and Docker images are signed with [Sigstore](https://sigstore.dev) via GitHub Actions artifact attestations.

          \`\`\`bash
          # Verify a downloaded binary
          gh attestation verify decree_linux_amd64.tar.gz --owner opendecree

          # Verify a Docker image
          gh attestation verify oci://ghcr.io/opendecree/decree:${VERSION} --owner opendecree
          gh attestation verify oci://ghcr.io/opendecree/decree-cli:${VERSION} --owner opendecree
          \`\`\`
          INSTALL
          } > /tmp/release-body.md

          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "content<<${EOF_MARKER}" >> $GITHUB_OUTPUT
          cat /tmp/release-body.md >> $GITHUB_OUTPUT
          echo "${EOF_MARKER}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --notes-start-tag "${{ steps.prev.outputs.tag }}" \
            --notes "${{ steps.body.outputs.content }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Builds cross-platform binaries (Linux/macOS/Windows × amd64/arm64) with
  # goreleaser and attaches them to the GitHub release created above.
  binaries:
    name: Build and publish binaries
    runs-on: ubuntu-latest
    needs: release-notes
    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run goreleaser
        # goreleaser/goreleaser-action@v7
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

  # Pushes the versioned proto module to the Buf Schema Registry so SDK
  # consumers can pin a specific commit and pull generated stubs.
  bsr:
    name: Push to BSR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Push to BSR
        # bufbuild/buf-action@v1
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff
        with:
          token: ${{ secrets.BUF_TOKEN }}
          push: true
          push_disable_create: true

  # Per-arch image builds. Each matrix entry runs natively on its own
  # architecture (amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm)
  # rather than going through QEMU emulation — issue #9. push-by-digest
  # is used so the manifest job downstream can claim the version + latest
  # tags after both arches finish.
  build:
    name: Build ${{ matrix.image.name }} (${{ matrix.arch.platform }})
    runs-on: ${{ matrix.arch.runner }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: decree,     dockerfile: build/Dockerfile }
          - { name: decree-cli, dockerfile: build/Dockerfile.decree }
        arch:
          - { platform: linux/amd64, runner: ubuntu-latest,    suffix: amd64 }
          - { platform: linux/arm64, runner: ubuntu-24.04-arm, suffix: arm64 }
    env:
      IMAGE_REF: ${{ format('ghcr.io/{0}/{1}', github.repository_owner, matrix.image.name) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.arch.platform }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
          # Per-arch buildcache tags shared with main.yml. Reading the
          # arm64 cache from an amd64 builder (or vice versa) wastes
          # network round-trips, so we keep them split.
          cache-from: type=registry,ref=${{ env.IMAGE_REF }}:buildcache-${{ matrix.arch.suffix }}
          cache-to: type=registry,ref=${{ env.IMAGE_REF }}:buildcache-${{ matrix.arch.suffix }},mode=max
          outputs: type=image,name=${{ env.IMAGE_REF }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          # Image name LAST so the manifest job's download pattern
          # (`digests-*-<image>`) doesn't accidentally match a different
          # image whose name starts with this one (decree vs decree-cli).
          name: digests-${{ matrix.arch.suffix }}-${{ matrix.image.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # One manifest job per image. Joins the per-arch digests into the
  # final :version + :latest multi-arch tags consumers pull.
  images:
    name: Manifest ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        image: [decree, decree-cli]
    env:
      IMAGE_REF: ${{ format('ghcr.io/{0}/{1}', github.repository_owner, matrix.image) }}
    steps:
      - name: Download digest artifacts
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*-${{ matrix.image }}
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            --tag "${{ env.IMAGE_REF }}:${{ steps.meta.outputs.version }}" \
            --tag "${{ env.IMAGE_REF }}:latest" \
            $(printf '${{ env.IMAGE_REF }}@sha256:%s ' *)

      - name: Inspect manifest
        run: docker buildx imagetools inspect "${{ env.IMAGE_REF }}:${{ steps.meta.outputs.version }}"

      - name: Get manifest digest
        id: manifest_digest
        run: |
          DIGEST=$(docker buildx imagetools inspect "${{ env.IMAGE_REF }}:${{ steps.meta.outputs.version }}" \
            --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE_REF }}
          subject-digest: ${{ steps.manifest_digest.outputs.digest }}
          push-to-registry: true

  # Runs e2e gRPC benchmarks against the just-released server image.
  # Moved here from ci.yml — too slow for per-PR runs. Results are uploaded
  # as release artifacts for latency tracking over versions.
  bench-e2e:
    name: E2E Benchmarks
    runs-on: ubuntu-latest
    needs: [images]
    permissions:
      contents: read
      packages: read
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull or build tools image
        id: tools
        run: |
          TAG="ghcr.io/${{ github.repository_owner }}/decree-tools:sha-$(sha256sum build/Dockerfile.tools | cut -c1-12)"
          if docker pull "$TAG" 2>/dev/null; then
            docker tag "$TAG" decree-tools
          else
            docker build -f build/Dockerfile.tools -t decree-tools .
          fi
          echo "image=decree-tools" >> $GITHUB_OUTPUT

      - name: Pull release server image
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          docker pull "ghcr.io/${{ github.repository_owner }}/decree:${VERSION}"
          docker tag "ghcr.io/${{ github.repository_owner }}/decree:${VERSION}" decree-service

      - name: Run e2e benchmarks
        run: |
          docker compose up -d --wait service
          cd e2e && go test -tags=e2e -bench=. -benchmem -run='^$' -benchtime=3s -count=5 ./... \
            | tee ../bench-e2e.txt || (cd .. && docker compose down -v && exit 1)
          docker compose down -v
        env:
          TOOLS_IMAGE: decree-tools
          SERVICE_IMAGE: decree-service

      - name: Compute p50/p95/p99 with benchstat
        run: |
          go run golang.org/x/perf/cmd/benchstat@latest bench-e2e.txt | tee bench-e2e-stats.txt

      - name: Upload e2e benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: bench-e2e-${{ github.ref_name }}
          path: |
            bench-e2e.txt
            bench-e2e-stats.txt
