coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0%
    patch:
      default:
        target: 80%

ignore:
  - "cmd/decree"
  - "cmd/server/main.go"
  - "api/centralconfig/**"
  - "internal/storage/dbstore/**"
  - "internal/audit/store_pg.go"
  - "internal/config/store_pg.go"
  - "sdk/grpctransport/**"
  - "cmd/server/openapi.json"
  - "docs/**"
